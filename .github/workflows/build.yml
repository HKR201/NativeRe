name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Builder 2.0 Nuclear Fix (Safe Manifest & SDK Bump)
        run: |
          flutter create tkr_erp
          cp pubspec.yaml tkr_erp/
          rm -rf tkr_erp/lib
          cp -r lib tkr_erp/
          
          # 1. သန့်ရှင်းပြီး 100% မှန်ကန်သော XML ကို တိုက်ရိုက်အစားထိုးခြင်း
          cat << 'EOF' > tkr_erp/android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <application
                  android:label="TKR ERP"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedded_views_preview"
                        android:value="true" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF
          
          # 2. Package များနှင့် ငြိမနေစေရန် Android MinSDK ကို 23 သို့ အတင်းမြှင့်ခြင်း
          sed -i 's/flutter.minSdkVersion/23/g' tkr_erp/android/app/build.gradle

      - name: Get Dependencies
        working-directory: ./tkr_erp
        run: flutter pub get

      - name: Build APK (Release)
        working-directory: ./tkr_erp
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealEstate-Release-APK
          path: tkr_erp/build/app/outputs/flutter-apk/app-release.apk
          
