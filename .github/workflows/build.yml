name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Builder 2.0 Smart Injector & Permission Fix
        run: |
          flutter create tkr_erp
          cp pubspec.yaml tkr_erp/
          rm -rf tkr_erp/lib
          cp -r lib tkr_erp/
          # SAFE MANIFEST INJECTION
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"\/>\n    <application/g' tkr_erp/android/app/src/main/AndroidManifest.xml

      - name: Get Dependencies
        working-directory: ./tkr_erp
        run: flutter pub get

      - name: Build APK (Release)
        working-directory: ./tkr_erp
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealEstate-Release-APK
          path: tkr_erp/build/app/outputs/flutter-apk/app-release.apk
          
